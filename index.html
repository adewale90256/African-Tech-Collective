<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Africa Tech Collective</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #091839;
        font-family: Arial, sans-serif;
      }

      #boot-loader {
        position: fixed;
        inset: 0;
        background: #091839;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      #boot-loader img {
        width: 100px;
        margin-bottom: 24px;
      }

      #boot-loader h1 {
        color: white;
        margin: 0;
        font-size: 32px;
        font-family: Georgia, serif;
      }

      #boot-loader p {
        color: #98abd1;
        margin-top: 12px;
      }

      .spinner {
        width: 45px;
        height: 45px;
        margin-top: 40px;
        border: 4px solid #fbbf24;
        border-top-color: transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-loader">
        <img
          src="/logo/AFRICAN TECH COLLECTIVE logo-12.png"
          alt="African Tech Collective"
          class="logo"
        />

        <h1>African Tech Collective</h1>

        <p>Connecting African Innovation with Global Capital</p>

        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
